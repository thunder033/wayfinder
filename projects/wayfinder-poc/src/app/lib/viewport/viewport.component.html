<div>
  <div #viewport id="viewport"></div>
  <div class="control-panel">
    <button qa-prev (click)="networkService.rollBackAlteration()">&laquo; Prev</button>
    <span qa-current-year>{{ currentYear$ | async }}</span>
    <button qa-next (click)="networkService.applyNextAlteration()">Next &raquo;</button>
    <button qa-grid-toggle (click)="displayGrid(!displayGrid$$.value)">Toggle Grid</button>
  </div>
</div>
